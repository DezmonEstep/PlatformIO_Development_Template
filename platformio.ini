# Global settings shared by all environments
[env]
framework = arduino
monitor_speed = 115200

# Environment for the Arduino Uno
[env:uno]
platform = atmelavr
board = uno
framework = arduino
# Declare external libraries here (Name or ID from registry, or Git URL)
lib_deps =
    bblanchon/ArduinoJson @ ^6.21.0
    milesburton/DallasTemperature @ ^3.9.1

# Environment for an ESP32 board
[env:esp32dev]
platform = espressif32
board = esp32dev

[env:heltec_wifi_lora_32_V3]
platform = espressif32
board = heltec_wifi_lora_32_V3
framework = arduino
monitor_speed = 115200

# Remove the manual macro definition so it doesn't collide with pins_arduino.h
build_flags =
    -D REGION_US915
    -D ACTIVE_REGION=LORAMAC_REGION_US915
    -D LoRaWAN_DEBUG_LEVEL=0

# Use the up-to-date repository version that handles the S3 pinouts natively
lib_deps =
    https://github.com/Heltec-Aaron-Lee/WiFi_Kit_series.git